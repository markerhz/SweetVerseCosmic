<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>SweetVerse Cosmic v0.2.2 Alpha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>🌌 SweetVerse Cosmic <small>v0.2.2 Alpha</small></h1>
  </header>
  <div id="hud">
    <div class="hud-box"><span class="hud-label">SCORE</span><span id="score" class="hud-value">0</span></div>
    <div class="hud-box"><span class="hud-label">MULT</span><span id="mult" class="hud-value">x1.0</span></div>
  </div>
  <canvas id="game"></canvas>
  <p id="hint">แตะลูกกวาด 1 เม็ด แล้วแตะเม็ดที่ติดกันเพื่อสลับ • คอมโบต่อเนื่อง = ตัวคูณเพิ่ม!</p>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
